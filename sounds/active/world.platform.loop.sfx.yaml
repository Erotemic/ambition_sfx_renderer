schema: ambition.sfxir.v1
id: world.platform.loop
duration_ms: 1000
notes: 'long quiet platform movement bed; auto policy writes OGG'

render:
  sample_rate: 48000
  channels: 2
  seed: 1857
  buffer_size: 128

layers:
  - name: tonal_body
    kind: dawdreamer_faust
    dsp: patches/faust/soft_saw.dsp
    gain_db: 0
    parameters:
      /AmbitionSoftSaw/freq:
        start: 130
        end: 135
        curve: exp
      /AmbitionSoftSaw/gain: -24
    envelope:
      attack_ms: 100
      hold_ms: 760
      release_ms: 140

  - name: pyfxr_seed
    kind: pyfxr
    preset: select
    seed: 1858
    gain_db: -42

postprocess:
  - effect: highpass
    cutoff_hz: 70
  - effect: compressor
    threshold_db: -18
    ratio: 2.4
    attack_ms: 3
    release_ms: 70
  - effect: lowpass
    cutoff_hz: 2600
  - effect: chorus
    rate_hz: 0.5
    depth: 0.04
    mix: 0.12
  - effect: limiter
    threshold_db: -2.0
    release_ms: 55
  - effect: normalize_peak
    target_db: -15.0
