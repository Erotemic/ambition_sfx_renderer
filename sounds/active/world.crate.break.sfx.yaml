schema: ambition.sfxir.v1
id: world.crate.break
duration_ms: 420
notes: 'crate/object break tail; auto policy writes OGG'

render:
  sample_rate: 48000
  channels: 2
  seed: 1861
  buffer_size: 128

layers:
  - name: tonal_body
    kind: dawdreamer_faust
    dsp: patches/faust/soft_saw.dsp
    gain_db: 0
    parameters:
      /AmbitionSoftSaw/freq:
        start: 240
        end: 64
        curve: exp
      /AmbitionSoftSaw/gain: -11
    envelope:
      attack_ms: 1
      hold_ms: 54
      release_ms: 365

  - name: pyfxr_seed
    kind: pyfxr
    preset: explosion
    seed: 1862
    gain_db: -21

postprocess:
