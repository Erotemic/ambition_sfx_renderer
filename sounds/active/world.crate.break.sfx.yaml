    cutoff_hz: 70
  - effect: compressor
    threshold_db: -18
    ratio: 2.4
    attack_ms: 3
    release_ms: 70
  - effect: distortion
    drive_db: 5
  - effect: lowpass
    cutoff_hz: 4200
  - effect: reverb
    room_size: 0.10
    wet_level: 0.045
  - effect: limiter
    threshold_db: -2.0
    release_ms: 55
  - effect: normalize_peak
    target_db: -4.0
