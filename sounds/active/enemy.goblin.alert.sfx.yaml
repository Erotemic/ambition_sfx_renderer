schema: ambition.sfxir.v1
id: enemy.goblin.alert
duration_ms: 160

render:
  sample_rate: 48000
  channels: 2
  seed: 1401
  buffer_size: 128

layers:
  - name: tonal_body
    kind: dawdreamer_faust
    dsp: patches/faust/tone.dsp
    gain_db: 0
    parameters:
      /AmbitionTone/freq:
        start: 330
        end: 520
        curve: exp
      /AmbitionTone/gain: -14
    envelope:
      attack_ms: 2
      hold_ms: 30
      release_ms: 115

  - name: pyfxr_seed
    kind: pyfxr
    preset: powerup
    seed: 1402
    gain_db: -25

postprocess:
  - effect: highpass
    cutoff_hz: 55
  - effect: compressor
    threshold_db: -18
    ratio: 2.4
    attack_ms: 3
    release_ms: 70
  - effect: distortion
    drive_db: 2
  - effect: limiter
    threshold_db: -2.0
    release_ms: 45
  - effect: normalize_peak
    target_db: -5.0
