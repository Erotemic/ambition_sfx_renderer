schema: ambition.sfxir.v1
id: world.secret.reveal
duration_ms: 780
notes: 'long discovery/reveal flourish; auto policy writes OGG'

render:
  sample_rate: 48000
  channels: 2
  seed: 1863
  buffer_size: 128

layers:
  - name: tonal_body
    kind: dawdreamer_faust
    dsp: patches/faust/tone.dsp
    gain_db: 0
    parameters:
      /AmbitionTone/freq:
        start: 520
        end: 1180
        curve: exp
      /AmbitionTone/gain: -15
    envelope:
      attack_ms: 20
      hold_ms: 380
      release_ms: 380

  - name: pyfxr_seed
    kind: pyfxr
    preset: powerup
    seed: 1864
    gain_db: -27

postprocess:
  - effect: highpass
    cutoff_hz: 70
  - effect: compressor
    threshold_db: -18
    ratio: 2.4
    attack_ms: 3
    release_ms: 70
  - effect: chorus
    rate_hz: 1.0
    depth: 0.18
    mix: 0.25
  - effect: reverb
    room_size: 0.21
    wet_level: 0.12
  - effect: limiter
    threshold_db: -2.0
    release_ms: 55
  - effect: normalize_peak
    target_db: -6.0
