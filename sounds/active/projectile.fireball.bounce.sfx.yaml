schema: ambition.sfxir.v1
id: projectile.fireball.bounce
duration_ms: 130

render:
  sample_rate: 48000
  channels: 2
  seed: 1305
  buffer_size: 128

layers:
  - name: tonal_body
    kind: dawdreamer_faust
    dsp: patches/faust/tone.dsp
    gain_db: 0
    parameters:
      /AmbitionTone/freq:
        start: 360
        end: 620
        curve: exp
      /AmbitionTone/gain: -13
    envelope:
      attack_ms: 1
      hold_ms: 14
      release_ms: 95

  - name: pyfxr_seed
    kind: pyfxr
    preset: select
    seed: 1306
    gain_db: -20

postprocess:
  - effect: highpass
    cutoff_hz: 55
  - effect: compressor
    threshold_db: -18
    ratio: 2.4
    attack_ms: 3
    release_ms: 70
  - effect: chorus
    rate_hz: 1.5
    depth: 0.08
    mix: 0.10
  - effect: limiter
    threshold_db: -2.0
    release_ms: 45
  - effect: normalize_peak
    target_db: -3.0
