schema: ambition.sfxir.v1
id: reset
duration_ms: 175

render:
  sample_rate: 48000
  channels: 2
  seed: 1081
  buffer_size: 128

layers:
  - name: tonal_body
    kind: dawdreamer_faust
    dsp: patches/faust/tone.dsp
    gain_db: 0
    parameters:
      /AmbitionTone/freq:
        start: 180
        end: 80
        curve: exp
      /AmbitionTone/gain: -15
    envelope:
      attack_ms: 3
      hold_ms: 25
      release_ms: 125

  - name: pyfxr_seed
    kind: pyfxr
    preset: select
    seed: 1082
    gain_db: -26

postprocess:
  - effect: highpass
    cutoff_hz: 55
  - effect: compressor
    threshold_db: -18
    ratio: 2.4
    attack_ms: 3
    release_ms: 70
  - effect: lowpass
    cutoff_hz: 6500
  - effect: limiter
    threshold_db: -2.0
    release_ms: 45
  - effect: normalize_peak
    target_db: -3.0
